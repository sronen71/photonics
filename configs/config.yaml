uniform:
  alpha_grid:
    start: 0.0
    end: 4.0
    increment: 1.0
  power_grid:
    start: 1.0
    end: 12.0
    increment: 1.0
  minimum_alpha: -2.0
  maximum_alpha: 6.0

physics:
  # Parameter units: normalized or SI. See README.md for the SI cavity
  # parameters and their units. This normalized configuration is the default.
  units: normalized
  alpha: 4.0
  f_real: 2.0
  # Default quadratic dispersion. To use an arbitrary relation, replace this
  # line with: dispersion_csv: path/to/dispersion.csv
  beta: -0.02

lle:
  # Common numerical settings used by every operation mode.
  spatial_points: 512
  final_time: 50.0
  dt: 0.005
  initial_noise: 0.001
  snapshots: 300
  # Average the output spectrum over this final normalized-time interval.
  spectrum_average_time: 5.0
  # Maximum stationary-LLE residual for reporting a near-stationary result.
  stationary_tolerance: 1.0e-3
  seed: 7

  # Initial field shape: empty or soliton.
  initial_shape: empty

  # Operation mode: direct or scan. This is independent of the initial field
  # shape selected above.
  # direct: Holds the shared physics parameters for the entire run.
  # scan: Uses scan_alpha_start and scan_time to ramp alpha.
  operation_mode: scan

  # scan mode.
  scan_alpha_start: 0.0
  scan_time: 30.0

steady:
  spatial_points: 512
  tolerance: 1.0e-9
  max_iterations: 1000
  # Used automatically to initialize a moving-frame solve when D(k) has an
  # odd part. Purely even dispersion goes directly to the v=0 solve.
  relaxation_time: 50.0
  relaxation_dt: 0.005
